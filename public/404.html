<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Zelva Portfolio</title>
    <script>
      // GitHub Pages SPA redirect hack
      // When a user directly navigates to e.g. /zelva-portfolio/designs,
      // GitHub Pages serves a 404. This script redirects to index.html
      // with the original path preserved as a query parameter,
      // which index.html then picks up and restores via History API.
      var pathSegmentsToKeep = 0; // Keep / base
      var l = window.location;
      l.replace(
        l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
        l.pathname.split('/').slice(0, 1 + pathSegmentsToKeep).join('/') + '/?/' +
        l.pathname.slice(1).split('/').slice(pathSegmentsToKeep).join('/').replace(/&/g, '~and~') +
        (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
        l.hash
      );
    </script>
  </head>
  <body></body>
</html>
