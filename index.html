<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lila — Creative Developer & Designer Portfolio</title>

    <!-- AI-Agent & SEO Meta Tags -->
    <meta name="description" content="Portfolio of Lila, a Product Designer specializing in artworks, UI/UX designs, creative coding, photography, and soundscapes.">
    <meta name="keywords" content="Lila, portfolio, designer, developer, creative coding, artworks, photography, soundscapes, UI/UX">
    <meta name="author" content="Lila">
    <meta name="robots" content="index, follow, max-image-preview:large, max-snippet:-1, max-video-preview:-1">

    <!-- Open Graph / Social -->
    <meta property="og:type" content="profile">
    <meta property="og:title" content="Lila — Product Designer Portfolio">
    <meta property="og:description" content="Portfolio showcasing artworks, designs, creative coding, photography, and soundscapes.">
    <meta property="og:url" content="https://lila.design">
    <meta property="og:image" content="https://lila.design/og-image.jpg">
    <meta property="profile:first_name" content="Lila">

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="Lila Portfolio">
    <meta name="twitter:description" content="Product Designer — Artworks, Designs, Creative Coding, Photography, Soundscapes">

    <!-- AI Agent Context -->
    <meta name="ai-content-type" content="personal-portfolio">
    <meta name="ai-purpose" content="showcase-creative-work">
    <meta name="ai-navigable" content="true">

    <!-- Structured Data: Person + CreativeWork -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@graph": [
        {
          "@type": "Person",
          "@id": "https://lila.design/#person",
          "name": "Lila",
          "jobTitle": "Creative Developer & Designer",
          "description": "Product Designer specializing in artworks, UI/UX designs, creative coding, photography, and soundscapes.",
          "url": "https://lila.design",
          "sameAs": [],
          "knowsAbout": [
            "UI/UX Design",
            "Creative Coding",
            "Photography",
            "Sound Design",
            "Visual Art",
            "Frontend Development"
          ]
        },
        {
          "@type": "WebSite",
          "@id": "https://lila.design/#website",
          "url": "https://lila.design",
          "name": "Lila Portfolio",
          "description": "Personal portfolio website of Lila.",
          "author": {
            "@id": "https://lila.design/#person"
          }
        }
      ]
    }
    </script>
  </head>
  <body>
    <!-- SPA redirect handler for GitHub Pages -->
    <script>
      (function(l) {
        if (l.search[1] === '/') {
          var decoded = l.search.slice(1).split('&').map(function(s) {
            return s.replace(/~and~/g, '&')
          }).join('?');
          window.history.replaceState(null, null,
            l.pathname.slice(0, -1) + decoded + l.hash
          );
        }
      }(window.location));
    </script>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
